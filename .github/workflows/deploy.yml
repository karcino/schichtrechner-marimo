name: Deploy marimo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build self-contained notebooks (inline htv_calc)
        run: uv run python build_wasm.py

      - name: Export Einzel-Rechner to WebAssembly
        run: uv run marimo export html-wasm _build/notebook.py -o public --mode run

      - name: Export Monats-Rechner to WebAssembly
        run: uv run marimo export html-wasm _build/notebook_monat.py -o public/monat --mode run

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
